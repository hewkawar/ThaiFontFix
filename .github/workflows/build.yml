name: Build And Release
on:
  push:
    branches:
      - "1.*"
      - "Action-Test-*"

jobs:
  build:
    name: Build Resource Pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Building Resource Pack
        uses: actions/upload-artifact@v3
        with:
          name: ThaiFontFix
          path: ./resourcepack

  release-content:
    name: Release Resource Pack
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download Artifacts
        id: download_artifacts
        uses: actions/download-artifact@v2
        with:
          name: ThaiFontFix

      - name: Zip artifact for deployment
        run: zip ThaiFontFix.zip ./* -r

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v.${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}

      - name: Upload Assets
        id: upload_assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ThaiFontFix.zip
          asset_name: ThaiFontFix-${{ github.ref_name }}.zip
          asset_content_type: application/zip

  publish:
    name: Publish Resource Pack (CurseForge/Modrinth)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download Artifacts
        id: download_artifacts
        uses: actions/download-artifact@v2
        with:
          name: ThaiFontFix

      - name: Zip artifact for deployment
        run: zip ThaiFontFix-${{ github.ref_name }}.zip ./* -r

      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@3.1.1
        with:
          token: ${{ secrets.PUBLISH_CURSEFORGE_TOKEN }}
          project_id: 997925
          game_endpoint: minecraft
          file_path: ThaiFontFix-${{ github.ref_name }}.zip
